<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <title>GeoRondo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>GeoRondo</h1>
        <div class="letter-circles">
            <div class="center-content">
                <div class="stats">
                    <div class="timer">Time: 2:30</div>
                    <div class="skips">Skips: 3 remaining</div>
                </div>
            
                <div class="question-container">
                    <div class ="question">...</div>
                    <input type="text" id="answer-input" placeholder="Type your answer here">
                </div>

                <div class="button-container">
                    <button id="start-button">Start Game</button>
                    <button id="skip-button">Skip(3 left)</button>
                </div>

                <div class="difficult-container">
                    <div class = "difficulty-text">Difficulty</div>
                    <select id = "difficulty">
                        <option value= "easy">Easy</option>
                        <option value= "medium">Medium</option>
                        <option value= "hard">Hard</option>
                        <option value= "grandmaster">Grandmaster</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="leaderboard">
            <h2>Leaderboard</h2>
            <table id="leaderboard-table">
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Time</th>
                    <th>Score</th>
                </tr>
            </table>
        </div>
        <div id="summary-container" class="summary hidden">
            <h2>Game Summary</h2>
            <table id="summary-table">
                <tr>
                    <th>Letter</th>
                    <th>Question</th>
                    <th>Your Answer</th>
                    <th>Status</th>
                    <th>Correct Answer</th>
                </tr>
            </table>
        </div>
     </div>
    <script src="questions.js"></script>
    <script src="gameFunctions.js"></script>
    <script src="script.js"></script>

</body>
